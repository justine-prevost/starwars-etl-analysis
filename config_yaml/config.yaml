swapi:
    url: 'https://swapi.dev/api/'
    endpoints:
        - people
        - planets
        - species

logging:
    version: 1
    formatters:
        simple:
            format: '%(levelname)s - %(message)s'
        detailled:
            format: '%(levelname)s - %(name)s - %(asctime)s - %(message)s'
    
    handlers:
        console:
            class: logging.StreamHandler
            level: DEBUG
            formatter: simple
            stream: ext://sys.stdout
        file:
            class: logging.FileHandler
            level: ERROR
            formatter: detailled
            filename: logs/app.log
    
    loggers:
        SimpleLogger:
            level: INFO
            handlers: [console, file]
            propagate: no
    
    root:
        level: DEBUG
        handlers: [console]
